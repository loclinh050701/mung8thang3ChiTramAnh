<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thiệp 8/3 - Star Magic Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nunito', sans-serif; overflow: hidden; background-color: #060b26; }

        /* === GIAO DIỆN CÀI ĐẶT === */
        #setup-screen {
            max-width: 500px; margin: 20px auto; padding: 25px;
            background: white; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            height: 90vh; overflow-y: auto; position: relative; z-index: 1000;
        }
        h2 { text-align: center; color: #d81b60; margin-bottom: 20px; font-family: 'Dancing Script', cursive; font-size: 35px;}
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #444; font-size: 14px;}
        input[type="text"], textarea, input[type="file"] {
            width: 100%; padding: 12px; border: 2px solid #fce4ec;
            border-radius: 10px; font-family: 'Nunito', sans-serif; outline: none;
        }
        textarea { height: 100px; resize: none; }
        .btn {
            display: block; width: 100%; padding: 14px;
            background-color: #d81b60; color: white; border: none;
            border-radius: 10px; font-size: 16px; font-weight: bold;
            cursor: pointer; margin-top: 12px; transition: all 0.3s;
            text-align: center; text-decoration: none;
        }

        #back-btn {
            position: fixed; top: 20px; left: 20px; z-index: 2000;
            padding: 10px 18px; background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px); border: 1px solid white;
            display: none; border-radius: 30px; color: white; cursor: pointer;
        }

        /* === MÀN HÌNH HIỆU ỨNG === */
        #animation-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #1a103c 0%, #060b26 100%);
            z-index: 10; flex-direction: column; align-items: center; justify-content: center;
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 11; }

        /* Khung tròn hoa */
        #flower-container {
            position: relative; width: 240px; height: 240px;
            display: none; z-index: 50;
            animation: popUp 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        #flower-img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 6px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.4);
        }

        /* Thiệp */
        #letter-box {
            display: none; position: absolute; z-index: 100;
            background: #fffdf5; width: 85%; max-width: 400px;
            padding: 25px; border-radius: 20px; box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            text-align: center; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        #letter-title { color: #d81b60; font-size: 22px; margin-bottom: 12px; font-weight: bold; border-bottom: 1px dashed #d81b60; padding-bottom: 8px;}
        #letter-content { font-size: 16px; line-height: 1.6; text-align: left; color: #333; min-height: 100px; }
        #letter-signature { font-family: 'Dancing Script', cursive; font-size: 26px; color: #d81b60; text-align: right; margin-top: 10px;}

        .floating-photo { position: absolute; border: 5px solid white; z-index: 40; opacity: 0; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        @keyframes popUp { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        /* ĐÃ SỬA: Giữ ảnh rõ nét (opacity: 1) tới 70% quãng đường rồi mới mờ dần */
        @keyframes floatUpDynamic {
            0% { transform: translateY(110vh) rotate(var(--start-rot)); opacity: 0; }
            15% { opacity: 1; } 
            70% { opacity: 1; } 
            100% { transform: translateY(-40vh) rotate(var(--end-rot)); opacity: 0; }
        }
    </style>
</head>
<body>

    <button id="back-btn" onclick="location.reload()">⬅ Quay lại sửa</button>

    <div id="setup-screen">
        <h2>Thiết kế quà 8/3</h2>
        <div class="form-group">
            <label>Tiêu đề thiệp</label>
            <input type="text" id="input-title">
        </div>
        <div class="form-group">
            <label>Lời chúc</label>
            <textarea id="input-content"></textarea>
        </div>
        <div class="form-group">
            <label>Ký tên</label>
            <input type="text" id="input-signature">
        </div>
        <div class="form-group">
            <label>🎵 Nhạc nền (MP3)</label>
            <input type="file" id="input-music-file" accept="audio/mp3">
        </div>
        <div class="form-group">
            <label>🖼️ Ảnh kỷ niệm</label>
            <input type="file" id="input-photos" accept="image/*" multiple>
        </div>
        <button class="btn" onclick="startShow()">🚀 Bắt đầu trình diễn</button>
    </div>

    <div id="animation-screen">
        <canvas id="starCanvas"></canvas>
        
        <div id="intro-box" style="z-index: 100; text-align: center; color: white;">
            <p style="font-family: 'Dancing Script', cursive; font-size: 30px;">Dành riêng cho chị...</p>
            <button class="btn" style="width: 200px; margin: 20px auto;" onclick="openGift()">Mở quà ngay 🎁</button>
        </div>

        <div id="flower-container">
            <img id="flower-img" src="hoa.jpg" alt="Flower">
        </div>

        <div id="letter-box">
            <div id="letter-title"></div>
            <div id="letter-content"></div>
            <div id="letter-signature"></div>
            <button id="btn-next" class="btn" onclick="startPhotos()" style="margin-top: 15px; display: none;">Xem ảnh kỷ niệm 🎈</button>
        </div>
        <audio id="audio-player" loop></audio>
    </div>

    <script>
        let photos = [];
        let musicSrc = "";
        let typingInterval, photoInterval;
        
        // --- CÀI ĐẶT CANVAS ---
        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let shootingStars = [];
        
        // ĐÃ SỬA: Thêm icon hoa và trái tim vào hai bên text. Các hạt sẽ tự động xếp thành hình này.
        const messages = ["✿ Chúc mừng 8/3 ✿", "❤ Chị Trâm Anh xinh đẹp ❤"];
        let msgIndex = 0;

        // Lưu/Tải dữ liệu
        const fields = ['input-title', 'input-content', 'input-signature'];
        window.onload = () => {
            fields.forEach(id => {
                const val = localStorage.getItem(id);
                if (val) document.getElementById(id).value = val;
            });
            if(!document.getElementById('input-title').value) document.getElementById('input-title').value = "Gửi Chị Trâm Anh";
            if(!document.getElementById('input-content').value) document.getElementById('input-content').value = "Chúc chị luôn xinh đẹp, hạnh phúc và thành công trong cuộc sống!";
            if(!document.getElementById('input-signature').value) document.getElementById('input-signature').value = "Em của chị";
        };
        fields.forEach(id => {
            document.getElementById(id).oninput = e => localStorage.setItem(id, e.target.value);
        });

        // Xử lý File
        document.getElementById('input-music-file').onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => musicSrc = ev.target.result;
            reader.readAsDataURL(e.target.files[0]);
        };
        document.getElementById('input-photos').onchange = e => {
            photos = [];
            Array.from(e.target.files).forEach(f => {
                const reader = new FileReader();
                reader.onload = ev => photos.push(ev.target.result);
                reader.readAsDataURL(f);
            });
        };

        function startShow() {
            if (photos.length === 0 || !musicSrc) {
                alert("Hãy thêm ảnh và nhạc nhé!");
                return;
            }
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('animation-screen').style.display = 'flex';
            document.getElementById('back-btn').style.display = 'block';
            document.getElementById('audio-player').src = musicSrc;
            
            initParticles();
            cycleMessages();
            animate();
        }

        function initParticles() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 1500; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    destX: Math.random() * canvas.width,
                    destY: Math.random() * canvas.height,
                    size: Math.random() * 1.5 + 0.5,
                    baseSize: Math.random() * 1.5 + 0.5,
                    opacity: Math.random(),
                    blinkSpeed: 0.01 + Math.random() * 0.03,
                    v: 0.015 + Math.random() * 0.02 // TỐC ĐỘ DI CHUYỂN RẤT CHẬM
                });
            }
        }

        function getPoints(text) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            const fSize = canvas.width < 600 ? 35 : 65;
            ctx.font = `bold ${fSize}px 'Nunito'`;
            ctx.textAlign = "center";
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            const points = [];
            const step = canvas.width < 600 ? 3 : 4; 
            for (let y = 0; y < canvas.height; y += step) {
                for (let x = 0; x < canvas.width; x += step) {
                    if (data[(y * canvas.width + x) * 4 + 3] > 128) {
                        points.push({ x, y });
                    }
                }
            }
            return points;
        }

        function cycleMessages() {
            const points = getPoints(messages[msgIndex]);
            particles.forEach((p, i) => {
                if (points[i]) {
                    p.destX = points[i].x;
                    p.destY = points[i].y;
                } else {
                    // Nếu thừa hạt thì cho bay ngẫu nhiên xa ra
                    p.destX = Math.random() * canvas.width;
                    p.destY = Math.random() * canvas.height;
                }
            });
            msgIndex = (msgIndex + 1) % messages.length;
            setTimeout(cycleMessages, 8000); // Mỗi câu tồn tại 8 giây
        }

        function createShootingStar() {
            if (Math.random() < 0.02) {
                shootingStars.push({
                    x: Math.random() * canvas.width + canvas.width/2,
                    y: Math.random() * canvas.height/2,
                    len: Math.random() * 80 + 50,
                    speed: Math.random() * 4 + 2,
                    opacity: 1
                });
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Vẽ hạt sao
            particles.forEach(p => {
                // Di chuyển chậm tới đích
                p.x += (p.destX - p.x) * p.v;
                p.y += (p.destY - p.y) * p.v;
                
                // Hiệu ứng nhấp nháy
                p.opacity += p.blinkSpeed;
                if (p.opacity > 1 || p.opacity < 0.2) p.blinkSpeed *= -1;

                ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });

            // Vẽ sao băng
            createShootingStar();
            shootingStars.forEach((s, i) => {
                s.x -= s.speed;
                s.y += s.speed * 0.6;
                s.opacity -= 0.01;
                
                const grad = ctx.createLinearGradient(s.x, s.y, s.x + s.len, s.y - s.len * 0.6);
                grad.addColorStop(0, `rgba(255,255,255,${s.opacity})`);
                grad.addColorStop(1, "rgba(255,255,255,0)");
                
                ctx.strokeStyle = grad;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(s.x + s.len, s.y - s.len * 0.6);
                ctx.stroke();

                if (s.opacity <= 0) shootingStars.splice(i, 1);
            });

            requestAnimationFrame(animate);
        }

        function openGift() {
            document.getElementById('audio-player').play();
            document.getElementById('intro-box').style.display = 'none';
            document.getElementById('flower-container').style.display = 'block';
            setTimeout(() => {
                document.getElementById('flower-container').style.display = 'none';
                document.getElementById('letter-box').style.display = 'block';
                typeLetter();
            }, 3000);
        }

        function typeLetter() {
            const title = document.getElementById('input-title').value;
            const content = document.getElementById('input-content').value;
            const sign = document.getElementById('input-signature').value;
            document.getElementById('letter-title').innerText = title;
            let i = 0;
            typingInterval = setInterval(() => {
                if (i < content.length) {
                    document.getElementById('letter-content').innerHTML += content[i] === '\n' ? '<br>' : content[i];
                    i++;
                } else {
                    clearInterval(typingInterval);
                    document.getElementById('letter-signature').innerText = sign;
                    document.getElementById('btn-next').style.display = 'block';
                }
            }, 50);
        }

        function startPhotos() {
            document.getElementById('letter-box').style.display = 'none';
            let idx = 0;
            photoInterval = setInterval(() => {
                if(!photos[idx % photos.length]) return;
                let img = document.createElement('img');
                img.src = photos[idx % photos.length];
                img.className = 'floating-photo';
                img.style.left = (Math.random() * 60 + 20) + 'vw';
                img.style.width = (Math.random() * 100 + 180) + 'px';
                img.style.setProperty('--start-rot', (Math.random()*40-20)+'deg');
                img.style.setProperty('--end-rot', (Math.random()*40-20)+'deg');
                img.style.animation = `floatUpDynamic ${Math.random()*2+8}s linear forwards`;
                document.getElementById('animation-screen').appendChild(img);
                setTimeout(() => img.remove(), 11000);
                idx++;
            }, 1500);
        }
    </script>
</body>
</html>
