<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Chị Trâm Anh👸🌹</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { font-family: 'Nunito', sans-serif; overflow: hidden; background-color: #060b26; width: 100vw; height: 100vh; }

        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a103c 0%, #060b26 100%);
            z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; padding: 20px;
        }

        #animation-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #1a103c 0%, #060b26 100%);
            z-index: 10;
        }

        /* Đảm bảo canvas luôn phủ kín và mượt */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 11; pointer-events: none; }

        .btn {
            padding: 15px 35px; background: #d81b60; color: white; border: none;
            border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 20px rgba(216, 27, 96, 0.6); z-index: 2100; transition: 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover { transform: scale(1.05); background: #f06292; }

        #flower-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 200px; height: 200px; display: none; z-index: 100;
            animation: popUp 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        /* Mobile điều chỉnh kích thước hoa nhỏ lại chút để cân đối */
        @media (min-width: 768px) { #flower-container { width: 250px; height: 250px; } }

        #flower-img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 6px solid rgba(255, 255, 255, 0.9); box-shadow: 0 0 40px rgba(255, 255, 255, 0.5);
        }

        #letter-box {
            display: none; position: absolute; z-index: 150;
            background: #fffdf5; width: 85%; max-width: 450px;
            padding: 20px; border-radius: 20px; box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            text-align: center; top: 50%; left: 50%; transform: translate(-50%, -50%);
            transition: opacity 1s;
        }
        
        /* Tối ưu chữ để không bị vỡ nét trên mobile */
        #letter-title { font-family: 'Dancing Script', cursive; color: #d81b60; font-size: 20px; margin-bottom: 12px; font-weight: bold; border-bottom: 1px dashed #d81b60; padding-bottom: 8px; min-height: 35px; }
        #letter-content { font-family: 'Dancing Script', cursive; font-size: 16px; line-height: 1.5; text-align: left; color: #333; min-height: 100px; word-wrap: break-word; }
        #letter-signature { font-family: 'Dancing Script', cursive; font-size: 24px; color: #d81b60; text-align: right; margin-top: 10px; min-height: 35px; }

        .floating-photo { position: absolute; border: 5px solid white; z-index: 40; opacity: 0; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); pointer-events: none; }

        @keyframes popUp { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes floatUpDynamic {
            0% { transform: translateY(110vh) rotate(var(--start-rot)); opacity: 0; }
            15% { opacity: 1; } 70% { opacity: 1; } 
            100% { transform: translateY(-40vh) rotate(var(--end-rot)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="intro-screen">
        <h1 style="font-family: 'Dancing Script', cursive; font-size: 32px; margin-bottom: 25px;">Chào Chị Trâm Anh...</h1>
        <button class="btn" onclick="startShow()">Mở món quà này 🎁</button>
    </div>

    <div id="animation-screen">
        <canvas id="starCanvas"></canvas>
        <div id="flower-container"><img id="flower-img" src="hoa.jpg"></div>
        <div id="letter-box">
            <div id="letter-title"></div>
            <div id="letter-content"></div>
            <div id="letter-signature"></div>
            <button id="btn-view-photos" class="btn" onclick="closeLetterAndShowPhotos()" style="display: none; margin-top: 20px; width: 100%; font-size: 16px;">Xem ảnh kỷ niệm 🎈</button>
        </div>
        <audio id="audio-player" src="nhac.mp3" loop></audio>
    </div>

    <script>
        const config = {
            title: "Gửi Chị Trâm Anh👸🌹",
            content: "Thú thật em không giỏi viết thư. Nhưng ngày 8/3 mà không nói gì thì... kỳ lắm! Có gì sai xót mong chị bỏ qua nhé. Chúc chị luôn giữ được sự an yên và xinh đẹp trong tâm hồn. Mong chị luôn có đủ thời gian để yêu chiều bản thân và tận hưởng những niềm vui nhỏ bé mỗi ngày, không chỉ riêng hôm nay chị thấy mình tuyệt vời, mà 364 ngày còn lại trong năm cũng sẽ luôn vui vẻ, thuận lợi và hạnh phúc y hệt như thế này.😻🌹",
            signature: "Trọng Linh",
            photos: [
                "https://lh3.googleusercontent.com/u/0/d/1t9lNjEYjTatC8t7S9n8yxAn-34B85nKu", "https://lh3.googleusercontent.com/u/0/d/1hXprMJ9MJ1D7Tur8dSfrDiyvkdOPhZP7",
                "https://lh3.googleusercontent.com/u/0/d/1uqxkcgMgBfPySPjUVgySk9nWCtlYUa4k", "https://lh3.googleusercontent.com/u/0/d/1UcAL4vZRn1IkIbJankpdfGeg-ql9tVi0",
                "https://lh3.googleusercontent.com/u/0/d/14FJtIBM0ZC8A5NID0nk73wyaYNoHWMHl", "https://lh3.googleusercontent.com/u/0/d/1wEESrTyG3e6BJ2bmfryzTIe25z6ELrQ3",
                "https://lh3.googleusercontent.com/u/0/d/1huYg7ohLmdeudkDwCLtBYW4xbtxtYrQA", "https://lh3.googleusercontent.com/u/0/d/15xRzPO6LmOhv8mu41RkFEqHQDPzU6VDb",
                "https://lh3.googleusercontent.com/u/0/d/1pTw-Zr3MC-Q3noiz9SioT7B9c9LxQW-s", "https://lh3.googleusercontent.com/u/0/d/1lo-ge8PGxBOKI_IAaCQ_GmmtCK_X0RTP",
                "https://lh3.googleusercontent.com/u/0/d/1xwVlE4KdJFyjSkZCQmz1mTic8CFkQNgw", "https://lh3.googleusercontent.com/u/0/d/11FPvBvIgx1zWOffBclhgIsppqVvSQXNC",
                "https://lh3.googleusercontent.com/u/0/d/1Wi_-qjxC8KKQDXinnR-HsorM7z-V7ixu", "https://lh3.googleusercontent.com/u/0/d/1m3eLpKpcheae530_qvGNTv3BraPOMgAT",
                "https://lh3.googleusercontent.com/u/0/d/1gAfYc4Mne1-Nsyb9IRh0Ok5x-Y6dAXST", "https://lh3.googleusercontent.com/u/0/d/1ObFAP7SBs86F3eypS_Xis4qtqCQODiuK",
                "https://lh3.googleusercontent.com/u/0/d/1lv-B3v7QUJ5uj4Ovuh-2lpHoDZ3K_D_N", "https://lh3.googleusercontent.com/u/0/d/1cJTdPLTcWxSF16AwzuAE_i8aKKwysiby",
                "https://lh3.googleusercontent.com/u/0/d/1QfPkKxcNE_ZaEmTWz7k0GEQ8aurweDrt", "https://lh3.googleusercontent.com/u/0/d/1Gv8mqtopQBkfPe5RVRTQQaNcKyCOaNYH",
                "https://lh3.googleusercontent.com/u/0/d/1SvW4Yh8D0Ctw6Ro9aMPQ1ooq5YOf6gsR", "https://lh3.googleusercontent.com/u/0/d/1KwImoPfE_QVy4lSeeP1zD5tRAHzH_52H",
                "https://lh3.googleusercontent.com/u/0/d/1beWEl7b52AiT1xQHikdsEAXn7usZwB7j", "https://lh3.googleusercontent.com/u/0/d/1GM-LYl94RQe_6C2iki5oJl_9AH-RnJMx",
                "https://lh3.googleusercontent.com/u/0/d/1b4jnY6fl0WE08ZxBMWRp4YQw_WdKFkBl", "https://lh3.googleusercontent.com/u/0/d/15oiqQLwDMQCKlmh9wgoY2byHzIatsqcL",
                "https://lh3.googleusercontent.com/u/0/d/1Njmx3YVv5A2NGdNE1f8FAiygPZiZq8i5", "https://lh3.googleusercontent.com/u/0/d/1esmNas2LOlgXZKaypfjp2FKW2vx1UuYH"
            ]
        };

        const canvas = document.getElementById('starCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [], shootingStars = [], msgIndex = 0;
        const messages = ["✿ Chúc mừng 8/3 ✿", "❤ Chị Trâm Anh xinh đẹp ❤"];

        function startShow() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('animation-screen').style.display = 'block';
            const audio = document.getElementById('audio-player');
            audio.play().catch(() => console.log("Audio needs user interaction"));
            
            initStars();
            cycleMessages();
            animate();
            
            setTimeout(() => {
                document.getElementById('flower-container').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('flower-container').style.display = 'none';
                    document.getElementById('letter-box').style.display = 'block';
                    startTypingSequence();
                }, 3500);
            }, 1000);
        }

        async function startTypingSequence() {
            await typeEffect('letter-title', config.title, 80);
            await typeEffect('letter-content', config.content, 40);
            await typeEffect('letter-signature', config.signature, 80);
            document.getElementById('btn-view-photos').style.display = 'block';
        }

        function typeEffect(id, text, speed) {
            return new Promise(resolve => {
                let i = 0;
                let element = document.getElementById(id);
                let timer = setInterval(() => {
                    if (i < text.length) {
                        element.innerHTML += text[i];
                        i++;
                    } else {
                        clearInterval(timer);
                        resolve();
                    }
                }, speed);
            });
        }

        function closeLetterAndShowPhotos() {
            document.getElementById('letter-box').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('letter-box').style.display = 'none';
                startPhotoFlow();
            }, 1000);
        }

        function initStars() {
            // Tối ưu độ phân giải cho màn hình Retina/Mobile
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.scale(dpr, dpr);
            
            particles = [];
            for (let i = 0; i < 800; i++) { // Giảm số lượng star trên mobile để mượt hơn nhưng vẫn dày
                particles.push({
                    x: Math.random() * window.innerWidth, 
                    y: Math.random() * window.innerHeight,
                    destX: 0, destY: 0, 
                    size: Math.random() * 1.2 + 0.3,
                    opacity: Math.random(), 
                    blink: 0.01 + Math.random() * 0.02, 
                    v: 0.03
                });
            }
        }

        function cycleMessages() {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = window.innerWidth;
            tempCanvas.height = window.innerHeight;

            tempCtx.fillStyle = "white";
            // Font chữ linh hoạt theo chiều rộng màn hình
            const fontSize = Math.min(window.innerWidth / 10, 50);
            tempCtx.font = `bold ${fontSize}px 'Nunito'`;
            tempCtx.textAlign = "center";
            tempCtx.fillText(messages[msgIndex], tempCanvas.width / 2, tempCanvas.height / 2);
            
            const data = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height).data;
            let points = [];
            // Lấy mẫu điểm ảnh (step 4 cho mobile đỡ lag)
            for (let y = 0; y < tempCanvas.height; y += 4) {
                for (let x = 0; x < tempCanvas.width; x += 4) {
                    if (data[(y * tempCanvas.width + x) * 4 + 3] > 128) points.push({ x, y });
                }
            }
            
            particles.forEach((p, i) => {
                if (points[i]) { 
                    p.destX = points[i].x; 
                    p.destY = points[i].y; 
                } else { 
                    p.destX = Math.random() * window.innerWidth; 
                    p.destY = Math.random() * window.innerHeight; 
                }
            });
            msgIndex = (msgIndex + 1) % messages.length;
            setTimeout(cycleMessages, 6000);
        }

        function animate() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            particles.forEach(p => {
                p.x += (p.destX - p.x) * p.v; 
                p.y += (p.destY - p.y) * p.v;
                p.opacity += p.blink; 
                if (p.opacity > 1 || p.opacity < 0.2) p.blink *= -1;
                ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                ctx.beginPath(); 
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); 
                ctx.fill();
            });

            // Hiệu ứng sao băng (Shooting Stars)
            if (Math.random() < 0.03) {
                shootingStars.push({
                    x: Math.random() * window.innerWidth + 200, 
                    y: Math.random() * window.innerHeight / 2, 
                    len: Math.random() * 60 + 40, 
                    speed: Math.random() * 5 + 3, 
                    o: 1
                });
            }
            
            shootingStars.forEach((s, i) => {
                s.x -= s.speed; 
                s.y += s.speed * 0.5; 
                s.o -= 0.015;
                ctx.strokeStyle = `rgba(255,255,255,${s.o})`;
                ctx.lineWidth = 1.5; 
                ctx.beginPath(); 
                ctx.moveTo(s.x, s.y); 
                ctx.lineTo(s.x + s.len, s.y - s.len * 0.5); 
                ctx.stroke();
                if (s.o <= 0) shootingStars.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }

        // --- PHẦN ĐƯỢC CHỈNH SỬA BẮT ĐẦU TỪ ĐÂY ---
        let activePhotos = new Set(); // Theo dõi các ảnh đang xuất hiện trên màn hình
        let lastLeftVw = -100;        // Theo dõi vị trí ngang của ảnh xuất hiện gần nhất

        function startPhotoFlow() {
            setInterval(() => {
                // 1. Lọc ra các ảnh CHƯA có trên màn hình
                let availablePhotos = config.photos.filter(src => !activePhotos.has(src));
                
                // (Dự phòng) Nếu tất cả ảnh đều đang bay (ít khi xảy ra), lấy lại từ đầu
                if (availablePhotos.length === 0) availablePhotos = config.photos;
                
                let randomSrc = availablePhotos[Math.floor(Math.random() * availablePhotos.length)];
                
                // Đánh dấu ảnh này đang được sử dụng
                activePhotos.add(randomSrc);

                let img = document.createElement('img');
                img.src = randomSrc;
                img.className = 'floating-photo';
                
                // 2. Tìm vị trí (left) sao cho không đè lấp lên ảnh trước đó quá nhiều
                let newLeftVw;
                let attempts = 0;
                do {
                    newLeftVw = Math.random() * 50 + 15; // Phân bổ từ 15vw tới 65vw
                    attempts++;
                } while (Math.abs(newLeftVw - lastLeftVw) < 20 && attempts < 10); // Đảm bảo cách ảnh trước ít nhất 20vw
                
                lastLeftVw = newLeftVw;
                
                img.style.left = newLeftVw + 'vw';
                img.style.width = window.innerWidth < 600 ? '150px' : '200px';
                img.style.setProperty('--start-rot', (Math.random()*40-20)+'deg');
                img.style.setProperty('--end-rot', (Math.random()*40-20)+'deg');
                img.style.animation = `floatUpDynamic 8s linear forwards`;
                
                document.body.appendChild(img);
                
                // Xóa ảnh sau 8s và giải phóng đường link để có thể được random lại
                setTimeout(() => {
                    img.remove();
                    activePhotos.delete(randomSrc);
                }, 8000);
            }, 2000);
        }
        // --- KẾT THÚC PHẦN CHỈNH SỬA ---

        // Xử lý khi xoay màn hình điện thoại
        window.addEventListener('resize', () => {
            initStars();
        });
    </script>
</body>
</html>
